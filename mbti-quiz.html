<style>

body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }

.screen { display: none; }
.screen.active { display: block; }

.progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.section-badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; margin-bottom: 0.75rem; }
.q-num { font-size: 13px; color: #999; margin-bottom: 0.5rem; }
.q-text { font-size: 17px; font-weight: 600; color: #222; margin-bottom: 1.5rem; line-height: 1.5; }

.choice-btn:hover { border-color: #bbb; background: #f5f5f5; }
.choice-btn.selected { border-width: 2px; background: #f5f4ff; }
.choice-emoji { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
.choice-text { font-size: 15px; color: #333; line-height: 1.5; }

.btn-next { width: 100%; padding: 0.9rem; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s; }
.btn-next:disabled { opacity: 0.35; cursor: default; }

.hero-emoji { text-align: center; font-size: 60px; margin-bottom: 1rem; }
.hero-title { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 0.5rem; color: #222; }
.hero-sub { font-size: 15px; text-align: center; color: #666; margin-bottom: 2rem; line-height: 1.7; }

.result-type { font-size: 44px; font-weight: 700; text-align: center; letter-spacing: 4px; margin-bottom: 0.25rem; color: #534AB7; }
.result-name { font-size: 19px; font-weight: 600; text-align: center; margin-bottom: 1.25rem; color: #333; }

.trait-pill { font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 99px; }
.score-bars { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
.score-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.score-label { width: 16px; font-weight: 700; }
.score-track { flex: 1; height: 8px; background: #eee; border-radius: 99px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 99px; }
.score-pct { width: 36px; text-align: right; font-size: 12px; color: #999; }
.result-desc { font-size: 15px; color: #333; line-height: 1.8; margin-bottom: 1.25rem; padding: 1.25rem; border-radius: 14px; background: #f7f7f7; border: 1px solid #eee; }
.jobs-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 0.6rem; }
.jobs-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.job-pill { font-size: 13px; padding: 5px 12px; border-radius: 99px; font-weight: 600; }
.retry-btn { display: block; width: 100%; padding: 0.85rem; border-radius: 12px; border: 1.5px solid #ccc; background: transparent; font-size: 16px; cursor: pointer; color: #444; font-weight: 600; }
.retry-btn:hover { background: #f5f5f5; }

@media (max-width: 480px) {
  body { padding: 0; align-items: flex-start; }
  .quiz-wrap { border-radius: 0; min-height: 100vh; box-shadow: none; }
}
</style>

    <div class="section-badge" id="section-badge"></div>
    <div class="q-num" id="q-num"></div>
    <div class="q-text">어느 쪽이 나랑 더 비슷해요?</div>

    <button class="btn-next" id="btn-next" disabled onclick="nextQ()">다음 →</button>

  <div class="screen" id="screen-result">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-type" id="result-type"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-traits" id="result-traits"></div>

</div>

  ISFJ:{ name:'따뜻한 수호자', emoji:'🛡️', traits:['배려심이 깊어요','책임감이 강해요','인내심이 있어요','꼼꼼해요'], desc:'주변 사람들을 챙기고 돌보는 걸 가장 중요하게 생각하는 친구예요. 친구가 슬프면 같이 슬퍼하고, 어려울 때는 조용히 곁에 있어 줘요. 맡은 일은 꼭 끝까지 해내고, 작은 것도 놓치지 않고 꼼꼼하게 챙겨요. 새로운 것보다 익숙한 것이 편하고, 친한 사람들과의 시간을 아주 소중하게 여겨요.', jobs:['간호사','선생님','사회복지사','사서','상담사'] },
  ISFP:{ name:'온화한 예술가', emoji:'🎨', traits:['감수성이 풍부해요','자유로워요','친절해요','현재를 즐겨요'], desc:'말은 많지 않지만 마음이 아주 따뜻하고 친절한 친구예요. 그림, 음악, 춤처럼 뭔가를 만들거나 표현하는 걸 좋아해요. 남들과 경쟁하기보다는 내가 좋아하는 것을 자유롭게 즐기는 편이에요. 동물이나 자연을 아끼고, 주변 친구들이 힘들면 조용히 다가가 도와줘요. 강요받는 걸 싫어하고 자기 속도대로 움직이는 게 좋아요.', jobs:['화가','음악가','수의사','패션 디자이너','사진작가'] },
  ESFP:{ name:'즐거운 엔터테이너', emoji:'🎉', traits:['밝고 활발해요','사교적이에요','유머가 있어요','적응을 잘해요'], desc:'어디서든 분위기를 밝게 만드는 태양 같은 친구예요! 웃음이 많고, 친구들을 웃기는 걸 좋아해요. 어떤 상황에서든 금방 적응하고, 새로운 친구를 사귀는 게 전혀 어렵지 않아요. 계획보다는 그 순간을 즐기는 편이고, 음악이나 공연처럼 신나는 걸 특히 좋아해요. 혼자 있는 것보다 사람들과 함께할 때 에너지가 넘쳐요.', jobs:['배우','가수','이벤트 기획자','간호사','스포츠 코치'] },
  ESFJ:{ name:'사교적인 친구', emoji:'🤝', traits:['친절해요','배려심이 있어요','사교적이에요','인화를 중시해요'], desc:'친구들과 사이좋게 지내는 게 무엇보다 중요한 친구예요. 누가 외롭거나 슬퍼 보이면 제일 먼저 달려가 말을 걸어요. 반 분위기를 밝게 만들고, 모두가 즐거울 수 있도록 신경을 많이 써요. 칭찬받을 때 아주 기쁘고, 친구가 나를 믿어줄 때 더욱 힘이 나요. 규칙을 잘 따르고 선생님 말씀도 열심히 들어요.', jobs:['선생님','상담사','간호사','사회복지사','영업 전문가'] },
  INFJ:{ name:'통찰력 있는 조언자', emoji:'🔮', traits:['직관력이 강해요','창의적이에요','따뜻해요','깊이 생각해요'], desc:'말은 조용하지만 마음속에 깊은 생각이 많은 친구예요. 친구의 표정만 봐도 "기분이 안 좋구나" 하고 바로 알아채요. 세상을 더 좋게 만들고 싶다는 꿈이 있고, 이야기 지어내기나 글쓰기를 잘해요. 혼자 조용히 생각하는 시간이 필요하고, 아주 친한 친구 몇 명과 깊은 이야기를 나누는 걸 좋아해요.', jobs:['상담사','작가','심리학자','사회운동가','선생님'] },
  INFP:{ name:'이상적인 중재자', emoji:'🌸', traits:['상상력이 풍부해요','따뜻해요','성실해요','창의적이에요'], desc:'마음이 따뜻하고 상상력이 아주 풍부한 친구예요. 동화책이나 판타지 이야기를 좋아하고, 머릿속에 자기만의 세상이 있어요. 친구가 힘들면 진심으로 같이 마음 아파하고, 약한 동물이나 친구를 도와주고 싶어 해요. 일기 쓰기나 그림 그리기처럼 혼자 조용히 표현하는 걸 즐겨요. 자신이 옳다고 생각하는 것에는 아주 끝까지 노력해요.', jobs:['작가','시인','상담사','그래픽 디자이너','교사'] },
  ENFP:{ name:'열정적인 활동가', emoji:'🌈', traits:['창의적이에요','열정이 넘쳐요','사교적이에요','호기심이 많아요'], desc:'새로운 것에 늘 눈이 반짝이는 에너지 넘치는 친구예요! 어제 안 해본 것, 처음 가는 곳, 새로 사귄 친구가 모두 설레요. 상상력이 풍부하고 엉뚱한 아이디어를 잘 내서 친구들을 깜짝 놀라게 해요. 친구들의 기분을 잘 알아채고, 모두가 신나게 놀 수 있도록 분위기를 이끌어요.', jobs:['기자','상담사','배우','광고인','선생님'] },
  ENFJ:{ name:'정의로운 사회자', emoji:'🌟', traits:['리더십이 있어요','공감 능력이 높아요','배려심이 깊어요','설득력이 있어요'], desc:'모두가 행복하고 사이좋게 지내기를 원하는 친구예요. 친구들 사이에 다툼이 생기면 가운데서 중재를 잘하고, 외로운 친구를 그냥 지나치지 못해요. 말솜씨가 좋고, 친구들에게 자신감을 불어넣어 주는 재능이 있어요. 모둠 활동에서 모두를 이끌어가는 역할을 자연스럽게 맡게 돼요.', jobs:['선생님','상담사','정치가','사회복지사','배우'] },
  INTJ:{ name:'전략적인 설계자', emoji:'♟️', traits:['독창적이에요','계획성이 강해요','목표 지향적이에요','논리적이에요'], desc:'머릿속에 늘 계획과 아이디어가 가득한 친구예요. "더 좋은 방법이 없을까?" 하고 항상 생각하고, 남들과 다른 나만의 방법을 즐겨 써요. 혼자 조용히 공부하는 걸 좋아하고, 목표를 세우면 끝까지 해내려는 강한 의지가 있어요. 쓸데없는 규칙보다는 논리적으로 맞는 게 중요하다고 생각해요.', jobs:['과학자','발명가','프로그래머','건축가','철학자'] },
  INTP:{ name:'논리적인 사색가', emoji:'🔭', traits:['지적 호기심이 강해요','논리적이에요','독창적이에요','분석을 잘해요'], desc:'"왜?"라는 질문을 가장 좋아하는 호기심 가득한 친구예요. 관심 있는 주제가 생기면 정말 깊이깊이 파고들어서 박사처럼 알게 돼요. 혼자서 책이나 영상으로 탐구하는 걸 즐기고, 새로운 아이디어를 떠올리는 걸 좋아해요. 친구가 많지는 않아도, 깊이 대화할 수 있는 친구와 함께할 때 행복해요.', jobs:['수학자','과학자','프로그래머','철학자','경제학자'] },
  ENTP:{ name:'뛰어난 발명가', emoji:'💡', traits:['창의적이에요','토론을 좋아해요','엉뚱해요','빠르게 배워요'], desc:'기발한 아이디어가 샘솟는 에너지 넘치는 친구예요! "이렇게 하면 어떨까?" 하는 생각이 끊이지 않아요. 토론이나 게임에서 재치 있는 말로 친구들을 깜짝 놀라게 해요. 새로운 것을 배우는 속도가 빠르고, 어려운 문제일수록 도전하고 싶어져요. 이것저것 관심사가 많고, 규칙보다는 자기만의 방법을 찾는 걸 좋아해요.', jobs:['발명가','변호사','기자','프로그래머','마케터'] },
  ENTJ:{ name:'대담한 통솔자', emoji:'👑', traits:['리더십이 강해요','목표 지향적이에요','결단력이 있어요','활동적이에요'], desc:'어디서든 자연스럽게 리더가 되는 친구예요. "우리 이렇게 하자!" 하고 먼저 방향을 제시하고, 모두를 이끌어가는 걸 즐겨요. 목표를 세우면 포기하지 않고 끝까지 달려가요. 모둠 과제나 놀이에서 계획을 세우고 친구들을 잘 조율해요. 그만큼 모두를 위해 열심히 하는 마음이 가득해요.', jobs:['기업 CEO','감독','정치가','변호사','교장 선생님'] },
};

const traitColors = ['#534AB7','#0F6E56','#185FA5','#854F0B'];
const jobColors   = ['#534AB7','#0F6E56','#993C1D','#185FA5','#854F0B'];

let current = 0, answers = new Array(36).fill(null), selected = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() { showScreen('screen-quiz'); renderQ(); }

function renderQ() {
  const q = questions[current], sec = sections[q.s];
  const badge = document.getElementById('section-badge');
  badge.textContent = sec.emoji + ' ' + sec.label;
  badge.style.background = sec.bg;
  badge.style.color = sec.color;
  document.getElementById('progress-fill').style.width = (current/36*100)+'%';
  document.getElementById('progress-fill').style.background = sec.color;
  document.getElementById('q-num').textContent = (current+1) + ' / 36';
  document.getElementById('emoji-a').textContent = q.a.e;
  document.getElementById('text-a').textContent = q.a.t;
  document.getElementById('emoji-b').textContent = q.b.e;
  document.getElementById('text-b').textContent = q.b.t;
  selected = answers[current];
  styleChoices(selected, sec.color);
  const btn = document.getElementById('btn-next');
  btn.disabled = (selected === null);
  btn.style.background = sec.color;
  btn.style.color = '#fff';
}

function styleChoices(sel, col) {
  const ca = document.getElementById('choice-a'), cb = document.getElementById('choice-b');
  ca.classList.toggle('selected', sel==='a'); cb.classList.toggle('selected', sel==='b');
  ca.style.borderColor = sel==='a' ? col : ''; cb.style.borderColor = sel==='b' ? col : '';
}

function selectChoice(c) {
  answers[current] = c; selected = c;
  styleChoices(c, sections[questions[current].s].color);
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (!selected) return;
  if (current < 35) { current++; renderQ(); }
  else showResult();
}

function showResult() {
  const scores = [[0,0],[0,0],[0,0],[0,0]];
  questions.forEach((q,i) => { if(answers[i]==='a') scores[q.s][0]++; else if(answers[i]==='b') scores[q.s][1]++; });
  let type = '';
  scores.forEach((sc,i) => { type += sections[i].pair[sc[0]>=sc[1]?0:1]; });
  const info = mbtiData[type];
  document.getElementById('result-emoji').textContent = info.emoji;
  document.getElementById('result-type').textContent = type;
  document.getElementById('result-name').textContent = info.name;
  document.getElementById('result-desc').textContent = info.desc;

  const traitsEl = document.getElementById('result-traits');
  traitsEl.innerHTML = '';
  info.traits.forEach((t,i) => {
    const col = traitColors[i%traitColors.length], pill = document.createElement('span');
    pill.className = 'trait-pill';
    pill.style.background = col+'22'; pill.style.color = col;
    pill.textContent = '✓ '+t; traitsEl.appendChild(pill);
  });

  const barsEl = document.getElementById('score-bars');
  barsEl.innerHTML = '';
  scores.forEach((sc,i) => {
    const sec = sections[i], total = sc[0]+sc[1];
    const winIdx = sc[0]>=sc[1]?0:1, winPct = Math.round((sc[winIdx]/total)*100);
    const row = document.createElement('div'); row.className = 'score-row';
    row.innerHTML = `<span class="score-label" style="color:${sec.color}">${sec.pair[winIdx]}</span><div class="score-track"><div class="score-fill" style="width:${winPct}%;background:${sec.color}"></div></div><span class="score-pct">${winPct}%</span>`;
    barsEl.appendChild(row);
  });

  const jobsEl = document.getElementById('jobs-wrap');
  jobsEl.innerHTML = '';
  info.jobs.forEach((j,i) => {
    const col = jobColors[i%jobColors.length], pill = document.createElement('span');
    pill.className = 'job-pill';
    pill.style.background = col+'22'; pill.style.color = col;
    pill.textContent = j; jobsEl.appendChild(pill);
  });

  showScreen('screen-result');
}

function restart() {
  current = 0; answers = new Array(36).fill(null); selected = null;
  showScreen('screen-intro');
}
</script>
